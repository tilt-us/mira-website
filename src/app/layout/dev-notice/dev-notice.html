@if (visible()) {
  <div
    class="fixed inset-x-0 bottom-0 z-40 flex justify-center p-4"
    role="status"
    aria-live="polite"
  >
    <div
      class="flex max-w-xl items-start gap-3 rounded-lg border border-surface-border bg-surface/95 px-5 py-4 text-sm text-white/80 shadow-2xl backdrop-blur"
    >
      <p>
        👋 Heads up — Mira's website is still in active development. Some things may
        look unfinished, change, or not work yet. Please be kind while we build it,
        and don't take anything here as final (or grounds for a lawsuit 😅). Thanks
        for stopping by!
      </p>
      <button
        type="button"
        class="link shrink-0 text-base leading-none"
        aria-label="Dismiss notice"
        data-testid="dev-notice-dismiss"
        (click)="dismiss()"
      >
        ✕
      </button>
    </div>
  </div>
}
