<div class="relative w-full max-w-xs">
  <button
    type="button"
    class="input flex w-full items-center justify-between gap-2"
    aria-haspopup="listbox"
    [attr.aria-expanded]="open()"
    data-testid="wallpaper-trigger"
    (click)="toggle()"
  >
    <span>{{ selectedLabel() }}</span>
    <span aria-hidden="true" class="text-white/50">▾</span>
  </button>

  @if (open()) {
    <button
      type="button"
      class="fixed inset-0 z-30 cursor-default"
      aria-hidden="true"
      tabindex="-1"
      data-testid="wallpaper-backdrop"
      (click)="close()"
    ></button>

    <div
      class="absolute left-0 z-40 mt-2 w-full rounded-lg border border-surface-border bg-surface p-2 shadow-2xl"
      role="listbox"
      data-testid="wallpaper-listbox"
    >
      <input
        type="text"
        class="input mb-2 w-full py-2 text-sm"
        placeholder="Search…"
        aria-label="Search wallpapers"
        data-testid="wallpaper-search"
        [ngModel]="search()"
        (ngModelChange)="search.set($event)"
      />

      @for (option of options(); track option.id) {
        <button
          type="button"
          role="option"
          class="flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm transition-colors hover:bg-surface-raised"
          [class.text-brand]="isSelected(option.id)"
          [attr.aria-selected]="isSelected(option.id)"
          [attr.data-testid]="'wallpaper-option-' + option.id"
          (click)="select(option.id)"
        >
          <span>{{ option.label }}</span>
          @if (isSelected(option.id)) {
            <span aria-hidden="true">✓</span>
          }
        </button>
      } @empty {
        <p class="px-3 py-2 text-sm text-white/50" data-testid="wallpaper-empty">
          No wallpapers found.
        </p>
      }
    </div>
  }
</div>
